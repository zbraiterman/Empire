name: vm_detection
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Detects if the target Linux system is running in a virtualized
  environment. Uses systemd-detect-virt to check for hypervisors,
  reads DMI/SMBIOS data from /sys/class/dmi for manufacturer and
  product information, and optionally runs dmidecode for detailed
  hardware identification. Checks for known hypervisor strings
  including VMware, VirtualBox, KVM, QEMU, Xen, and Hyper-V.
software: ''
tactics: [TA0005, TA0007]
techniques: [T1497.001]
background: false
output_extension: ''
needs_admin: false
opsec_safe: true
language: python
min_language_version: '2.6'
comments:
  - https://github.com/redcanaryco/atomic-red-team
options:
script: |
  import os
  import subprocess

  results = []
  vm_detected = False
  vm_strings = ['vmware', 'virtualbox', 'kvm', 'qemu', 'xen',
                'hyper-v', 'parallels', 'oracle', 'innotek', 'bochs']

  # Check 1: systemd-detect-virt
  try:
      output = run_command('systemd-detect-virt 2>/dev/null').strip()
      if output and output != 'none':
          results.append('[!] systemd-detect-virt: {}'.format(output))
          vm_detected = True
      else:
          results.append('[*] systemd-detect-virt: none (physical or undetected)')
  except Exception as e:
      results.append('[*] systemd-detect-virt not available: {}'.format(str(e)))

  # Check 2: /sys/class/dmi checks
  dmi_files = {
      'sys_vendor': '/sys/class/dmi/id/sys_vendor',
      'product_name': '/sys/class/dmi/id/product_name',
      'board_vendor': '/sys/class/dmi/id/board_vendor',
      'bios_vendor': '/sys/class/dmi/id/bios_vendor',
      'chassis_vendor': '/sys/class/dmi/id/chassis_vendor',
  }
  for label, path in dmi_files.items():
      if os.path.exists(path):
          try:
              with open(path, 'r') as f:
                  val = f.read().strip()
              results.append('[*] {}: {}'.format(label, val))
              for vm_str in vm_strings:
                  if vm_str in val.lower():
                      results.append('[!] VM indicator in {}: {}'.format(label, vm_str))
                      vm_detected = True
          except Exception:
              pass

  # Check 3: dmidecode (requires root)
  try:
      output = run_command('dmidecode -t system 2>/dev/null | grep -iE "manufacturer|product|vendor"').strip()
      if output:
          results.append('[*] dmidecode output:')
          for line in output.split('\n'):
              results.append('    {}'.format(line.strip()))
              for vm_str in vm_strings:
                  if vm_str in line.lower():
                      results.append('[!] VM indicator in dmidecode: {}'.format(vm_str))
                      vm_detected = True
  except Exception:
      results.append('[*] dmidecode not available (may require root)')

  # Check 4: /proc/cpuinfo hypervisor flag
  try:
      with open('/proc/cpuinfo', 'r') as f:
          cpuinfo = f.read()
      if 'hypervisor' in cpuinfo:
          results.append('[!] Hypervisor flag found in /proc/cpuinfo')
          vm_detected = True
  except Exception:
      pass

  results.append('')
  if vm_detected:
      results.append('[+] RESULT: Virtualization environment DETECTED.')
  else:
      results.append('[+] RESULT: No virtualization indicators found.')

  print('\n'.join(results))
