name: bofroast
authors:
  - name: Bobby Cooke
    handle: '@0xBoku'
    link: https://github.com/boku7
description: |
  Beacon Object File (BOF) for Kerberoasting Active Directory. Requests TGS
  tickets for service accounts with registered SPNs that can then be cracked
  offline. Operates entirely at the BOF level without requiring .NET CLR,
  resulting in a smaller footprint than C# alternatives like Rubeus.
software: ''
tactics: [TA0006]
techniques: [T1558.003]
background: false
output_extension:
needs_admin: false
opsec_safe: true
language: bof
min_language_version: ''
comments:
  - https://github.com/sliverarmory/BofRoast
options:
  - name: Architecture
    description: Architecture of the BOF to generate with (x64 or x86).
    required: true
    value: x64
    strict: true
    suggested_values:
      - x64
      - x86
  - name: SPN
    description: Target Service Principal Name (SPN) to kerberoast. Leave empty to
      enumerate and roast all SPNs.
    required: false
    value: ''
bof:
  x86: bof/bofroast/kerberoast.x86.o
  x64: bof/bofroast/kerberoast.x64.o
  entry_point: ''
  format_string: Z
script_path: ''
script_end: ''
advanced:
  custom_generate: true
