name: handlekatz
authors:
  - name: codewhitesec
    handle: ''
    link: https://github.com/codewhitesec
description: |
  Beacon Object File (BOF) port of HandleKatz that dumps LSASS by duplicating
  an existing handle to the LSASS process rather than opening a new one. This
  evades handle-based detections that monitor for new LSASS handles. Writes
  a minidump to the specified path. x64 only. Requires administrator privileges.
software: ''
tactics: [TA0006]
techniques: [T1003.001]
background: false
output_extension:
needs_admin: true
opsec_safe: true
language: bof
min_language_version: ''
comments:
  - https://github.com/codewhitesec/HandleKatz
options:
  - name: Pid
    description: Process ID of the LSASS process.
    required: true
    value: ''
  - name: DumpPath
    description: File path to write the LSASS minidump to.
    required: true
    value: ''
bof:
  x86: ''
  x64: bof/handlekatz/handlekatz.x64.o
  entry_point: ''
  format_string: iz
script_path: ''
script_end: ''
advanced:
  custom_generate: true
