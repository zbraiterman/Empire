name: credman
authors:
  - name: James Foreshaw
    handle: ''
    link: https://twitter.com/tiraniddo
  - name: anthemtotheego
    handle: '@anthemtotheego'
    link: https://github.com/anthemtotheego
description: |
  Beacon Object File (BOF) that dumps the Windows Credential Manager by abusing
  the SeTrustedCredManAccess privilege. Steals a token from a specified process
  (e.g., winlogon.exe) to enable the privilege, then enumerates all stored
  credentials. Based on James Foreshaw's research on trusted credential manager
  access.
software: ''
tactics: [TA0006]
techniques: [T1555.004]
background: false
output_extension:
needs_admin: true
opsec_safe: true
language: bof
min_language_version: ''
comments:
  - https://github.com/sliverarmory/CredManBOF
options:
  - name: Architecture
    description: Architecture of the BOF to generate with (x64 or x86).
    required: true
    value: x64
    strict: true
    suggested_values:
      - x64
      - x86
  - name: Pid
    description: Process ID to steal token from (e.g., winlogon.exe PID). Required
      for SeTrustedCredManAccess privilege.
    required: true
    value: ''
bof:
  x86: bof/credman/credman.x86.o
  x64: bof/credman/credman.x64.o
  entry_point: ''
  format_string: i
script_path: ''
script_end: ''
advanced:
  custom_generate: true
