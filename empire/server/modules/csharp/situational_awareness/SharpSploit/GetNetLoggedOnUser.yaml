name: GetNetLoggedOnUser
authors:
  - name: Anthony Rose
    handle: Cx01N
    link: https://twitter.com/Cx01N_
description: |
  C# module that leverages SharpSploit's Net enumeration capabilities to discover
  and enumerate logged-on users on the local system. Uses SharpSploit's Net class
  to query the local system for logged-on user information, returning detailed
  LoggedOnUser information including user names, descriptions, and local attributes.
  Supports targeted enumeration of specific logged-on users by name or comprehensive
  enumeration of all logged-on users.
software: ''
tactics: [TA0007]
techniques: [T1033, T1018]
background: false
output_extension: ''
needs_admin: false
opsec_safe: true
language: csharp
min_language_version: ''
options:
  - name: ComputerNames
    description: List of comma-delimited ComputerNames to query.
    required: false
    value: DC01
    strict: false
    suggested_values: []
csharp:
  UnsafeCompile: false
  CompatibleDotNetVersions:
    - Net35
    - Net40
  Code: |
    using System;
    using System.IO;
    using System.Linq;
    using System.Collections.Generic;
    using SharpSploit.Enumeration;

    public static class Program
    {
        public static void Main(string[] args)
        {
            string computerNames = args.Length > 0 ? args[0] : "";
            string result = GetLoggedOnUsers(computerNames);
            Console.WriteLine(result);
        }

        public static string GetLoggedOnUsers(string computerNames)
        {
            using (StringWriter stringWriter = new StringWriter())
            {
                try
                {
                    List<string> computerList = computerNames.Split(',').ToList();
                    List<Net.LoggedOnUser> loggedOnUsers = Net.GetNetLoggedOnUsers(computerList);

                    foreach (Net.LoggedOnUser loggedOnUser in loggedOnUsers)
                    {
                        stringWriter.WriteLine(loggedOnUser.ToString());
                        stringWriter.WriteLine("------");
                    }
                }
                catch (Exception e)
                {
                    stringWriter.WriteLine(e.GetType().FullName + ": " + e.Message + Environment.NewLine + e.StackTrace);
                }

                return stringWriter.ToString();
            }
        }
    }
  ReferenceSourceLibraries:
    - Name: SharpSploit
      Description: SharpSploit is a library for C# post-exploitation modules.
      Location: SharpSploit\SharpSploit\
      Language: CSharp
      CompatibleDotNetVersions:
        - Net35
        - Net40
      ReferenceAssemblies: []
      EmbeddedResources: []
  ReferenceAssemblies: []
  EmbeddedResources: []
