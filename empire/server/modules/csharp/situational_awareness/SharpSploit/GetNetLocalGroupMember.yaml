name: GetNetLocalGroupMember
authors:
  - name: Anthony Rose
    handle: Cx01N
    link: https://twitter.com/Cx01N_
description: |
  C# module that leverages SharpSploit's Net enumeration capabilities to discover
  and enumerate local group members on the local system. Uses SharpSploit's Net class
  to query the local system for local group member information, returning detailed
  LocalGroupMember information including member names, descriptions, and local attributes.
  Supports targeted enumeration of specific local group members by name or comprehensive
  enumeration of all local group members.
software: ''
tactics: [TA0007]
techniques: [T1069.002]
background: false
output_extension: ''
needs_admin: false
opsec_safe: true
language: csharp
min_language_version: ''
options:
  - name: ComputerNames
    description: List of comma-delimited ComputerNames to query.
    required: false
    value: DC01
    strict: false
    suggested_values: []
  - name: LocalGroup
    description: LocalGroup name to query for members.
    required: false
    value: Administrators
    strict: false
    suggested_values: []
csharp:
  UnsafeCompile: false
  CompatibleDotNetVersions:
    - Net35
    - Net40
  Code: |
    using System;
    using System.IO;
    using System.Linq;
    using System.Collections.Generic;
    using SharpSploit.Enumeration;

    public static class Program
    {
        public static void Main(string[] args)
        {
            string computerNames = args.Length > 0 ? args[0] : "";
            string groupName = args.Length > 1 ? args[1] : "Administrators";
            string result = GetLocalGroupMembers(computerNames, groupName);
            Console.WriteLine(result);
        }

        public static string GetLocalGroupMembers(string computerNames, string groupName)
        {
            using (StringWriter stringWriter = new StringWriter())
            {
                try
                {
                    List<string> computerList = computerNames.Split(',').ToList();
                    List<Net.LocalGroupMember> localGroupMembers = Net.GetNetLocalGroupMembers(computerList, groupName);

                    foreach (Net.LocalGroupMember localGroupMember in localGroupMembers)
                    {
                        stringWriter.WriteLine(localGroupMember.ToString());
                        stringWriter.WriteLine("------");
                    }
                }
                catch (Exception e)
                {
                    stringWriter.WriteLine(e.GetType().FullName + ": " + e.Message + Environment.NewLine + e.StackTrace);
                }

                return stringWriter.ToString();
            }
        }
    }
  ReferenceSourceLibraries:
