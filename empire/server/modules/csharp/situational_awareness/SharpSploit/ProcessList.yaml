name: ProcessList
authors:
  - name: Anthony Rose
    handle: Cx01N
    link: https://twitter.com/Cx01N_
description: |
  C# module that leverages SharpSploit's ProcessList functionality to enumerate
  currently running processes on the local system. Uses SharpSploit's Host class
  to query the local system for process information, returning detailed ProcessInfo
  information including process names, descriptions, and local attributes.
software: ''
tactics: [TA0007]
techniques: [T1057]
background: false
output_extension: ''
needs_admin: false
opsec_safe: true
language: csharp
min_language_version: ''
options: []
csharp:
  UnsafeCompile: false
  CompatibleDotNetVersions:
    - Net35
    - Net40
  Code: |
    using System;
    using System.IO;
    using SharpSploit.Enumeration;

    public static class Program
    {
        public static void Main(string[] args)
        {
            string result = GetProcessList();
            Console.WriteLine(result);
        }

        public static string GetProcessList()
        {
            using (StringWriter stringWriter = new StringWriter())
            {
                try
                {
                    var processes = Host.GetProcessList();
                    stringWriter.WriteLine(processes.ToString());
                }
                catch (Exception e)
                {
                    stringWriter.WriteLine(e.GetType().FullName + ": " + e.Message + Environment.NewLine + e.StackTrace);
                }

                return stringWriter.ToString();
            }
        }
    }
