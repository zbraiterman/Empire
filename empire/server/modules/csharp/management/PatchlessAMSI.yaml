name: PatchlessAMSI
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Antimalware Scan Interface (AMSI) allows providers such as Microsoft Defender to inspect script and in-memory content before execution. This module implements a patchless AMSI bypass by placing a hardware breakpoint on amsi.dll!AmsiScanBuffer and handling the resulting single-step exception with a vectored exception handler (VEH). Unlike classic AMSI bypasses that patch AmsiScanBuffer bytes in memory, this approach avoids modifying executable code and reduces detection opportunities tied to inline patch signatures. When triggered, the handler short-circuits the function and forces a clean scan result path so scripted content can continue executing.
