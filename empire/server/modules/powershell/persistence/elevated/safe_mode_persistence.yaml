name: Set-SafeModePersistence
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Establishes persistence by forcing Windows to boot into Safe Mode
  and registering a service to run in Safe Mode. Most security
  products and endpoint detection tools do not start in Safe Mode,
  allowing the attacker's service to run with minimal interference.
  The module writes an Empire launcher to a batch file, creates a
  Windows service pointing to it, registers the service under both
  SafeBoot\Minimal and SafeBoot\Network registry keys, and uses
  bcdedit to configure Safe Mode boot.
software: ''
tactics: [TA0003, TA0005]
techniques: [T1562.009]
background: false
output_extension:
needs_admin: true
opsec_safe: false
language: powershell
min_language_version: '2'
comments:
  - https://github.com/redcanaryco/atomic-red-team
options:
  - name: Listener
    description: Listener to use for the stager.
    required: true
    value: ''
  - name: Language
    description: Language of the stager to generate.
    required: true
    value: powershell
    strict: true
    suggested_values:
      - powershell
      - csharp
      - ironpython
      - go
  - name: ServiceName
    description: Name of the service to register for Safe Mode execution.
    required: true
    value: 'EmpireSvc'
  - name: ScriptPath
    description: Path where the launcher batch file will be written.
    required: true
    value: 'C:\Windows\Temp\empire_svc.bat'
  - name: SafeBootType
    description: Safe Mode type to configure (Minimal or Network).
    required: false
    value: 'Network'
    strict: true
    suggested_values:
      - Minimal
      - Network
  - name: ForceReboot
    description: >-
      Set to True to schedule a reboot into Safe Mode 30 seconds after install completes
      (via shutdown /r /t 30). Default False leaves the reboot to the operator.
    required: false
    value: 'False'
    strict: true
    suggested_values:
      - 'True'
      - 'False'
  - name: Obfuscate
    description: Obfuscate the launcher powershell code.
    required: false
    value: 'False'
    strict: true
    suggested_values:
      - True
      - False
    depends_on:
      - name: Language
        values: ['powershell']
  - name: ObfuscateCommand
    description: The Invoke-Obfuscation command to use.
    required: false
    value: Token\All\1
    depends_on:
      - name: Language
        values: ['powershell']
      - name: Obfuscate
        values: ['True']
  - name: Bypasses
    description: Bypasses as a space separated list to be prepended to the launcher.
    required: false
    value: ''
  - name: UserAgent
    description: User-agent string to use for the staging request (default, none,
      or other).
    required: false
    value: default
  - name: Proxy
    description: Proxy to use for request (default, none, or other).
    required: false
    value: default
  - name: ProxyCreds
    description: Proxy credentials ([domain\]username:password) to use for request
      (default, none, or other).
    required: false
    value: default
  - name: Cleanup
    description: Remove the persistence mechanism and restore normal boot.
    required: false
    value: 'False'
    strict: true
    suggested_values:
      - True
      - False
advanced:
  custom_generate: true
