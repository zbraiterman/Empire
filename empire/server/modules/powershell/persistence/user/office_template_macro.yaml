name: Set-OfficeTemplateMacro
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Plants a VBA macro containing an Empire launcher into a Microsoft
  Office default template for persistence. For Word, the macro is
  injected into Normal.dotm as AutoOpen in a standard module. For
  Excel, the macro is injected into Personal.xlsb as Workbook_Open
  inside the ThisWorkbook document-class module (the only place
  Workbook_Open will auto-fire from). The module enables programmatic
  VBA access by setting the AccessVBOM registry value (original value
  is backed up and restored on Cleanup), then uses COM automation to
  inject the macro.
software: ''
tactics: [TA0003]
techniques: [T1137.001]
background: false
output_extension:
needs_admin: false
opsec_safe: false
language: powershell
min_language_version: '2'
comments:
  - https://github.com/redcanaryco/atomic-red-team
options:
  - name: Listener
    description: Listener to use for the stager.
    required: true
    value: ''
  - name: Language
    description: Language of the stager to generate.
    required: true
    value: powershell
    strict: true
    suggested_values:
      - powershell
      - csharp
      - ironpython
      - go
  - name: TargetApp
    description: Office application to target (word or excel).
    required: true
    value: 'word'
    strict: true
    suggested_values:
      - word
      - excel
  - name: Obfuscate
    description: Obfuscate the launcher powershell code.
    required: false
    value: 'False'
    strict: true
    suggested_values:
      - True
      - False
    depends_on:
      - name: Language
        values: ['powershell']
  - name: ObfuscateCommand
    description: The Invoke-Obfuscation command to use.
    required: false
    value: Token\All\1
    depends_on:
      - name: Language
        values: ['powershell']
      - name: Obfuscate
        values: ['True']
  - name: Bypasses
    description: Bypasses as a space separated list to be prepended to the launcher.
    required: false
    value: ''
  - name: UserAgent
    description: User-agent string to use for the staging request (default, none,
      or other).
    required: false
    value: default
  - name: Proxy
    description: Proxy to use for request (default, none, or other).
    required: false
    value: default
  - name: ProxyCreds
    description: Proxy credentials ([domain\]username:password) to use for request
      (default, none, or other).
    required: false
    value: default
  - name: Cleanup
    description: Remove the persistence mechanism and restore original template.
    required: false
    value: 'False'
    strict: true
    suggested_values:
      - True
      - False
advanced:
  custom_generate: true
