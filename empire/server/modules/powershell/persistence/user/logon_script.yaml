name: Logon-Script
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Establishes persistence by setting the UserInitMprLogonScript
  registry value under HKCU\Environment. This value specifies a
  script that Windows executes during user logon. The module
  generates a launcher from the specified listener and writes it
  as a batch script, then registers it via the registry key. This
  is a well-known persistence mechanism that survives reboots.
software: ''
tactics: [TA0003]
techniques: [T1037.001]
background: true
output_extension:
needs_admin: false
opsec_safe: false
language: powershell
min_language_version: '2'
comments:
  - https://github.com/redcanaryco/atomic-red-team
options:
  - name: Listener
    description: Listener to use for the stager.
    required: true
    value: ''
  - name: Language
    description: Language of the stager to generate.
    required: true
    value: powershell
    strict: true
    suggested_values:
      - powershell
      - csharp
      - ironpython
      - go
  - name: ScriptPath
    description: Path where the logon script will be written.
    required: true
    value: '$env:TEMP\logon_script.bat'
  - name: Obfuscate
    description: Obfuscate the launcher powershell code.
    required: false
    value: 'False'
    strict: true
    suggested_values:
      - True
      - False
    depends_on:
      - name: Language
        values: ['powershell']
  - name: ObfuscateCommand
    description: The Invoke-Obfuscation command to use.
    required: false
    value: Token\All\1
    depends_on:
      - name: Language
        values: ['powershell']
      - name: Obfuscate
        values: ['True']
  - name: Bypasses
    description: Bypasses as a space separated list to be prepended to the launcher.
    required: false
    value: ''
  - name: UserAgent
    description: User-agent string to use for the staging request (default, none,
      or other).
    required: false
    value: default
  - name: Proxy
    description: Proxy to use for request (default, none, or other).
    required: false
    value: default
  - name: ProxyCreds
    description: Proxy credentials ([domain\]username:password) to use for request
      (default, none, or other).
    required: false
    value: default
  - name: Cleanup
    description: Remove the persistence mechanism and clean up artifacts.
    required: false
    value: 'False'
    strict: true
    suggested_values:
      - True
      - False
advanced:
  custom_generate: true
