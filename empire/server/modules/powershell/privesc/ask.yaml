name: Invoke-Ask
authors:
  - name: Jack64
    handle: ''
    link: ''
description: |
  Leverages Start-Process' -Verb runAs option inside a YES-Required loop
  to prompt the user for a high integrity context before running the agent code.
  UAC will report Powershell is requesting Administrator privileges. Because this
  does not use the BypassUAC DLLs, it should not trigger any AV alerts.
software: ''
tactics: [TA0004, TA0006, TA0009]
techniques: [T1056.002]
background: true
output_extension:
needs_admin: false
opsec_safe: false
language: powershell
min_language_version: '2'
comments:
  - https://github.com/rapid7/metasploit-framework/blob/master/modules/exploits/windows/local/ask.rb
options:
  - name: Listener
    description: Listener to use.
    required: true
    value: ''
  - name: Obfuscate
    description: Obfuscate the launcher powershell code, uses the ObfuscateCommand
      for obfuscation types.
    required: false
    value: 'False'
    strict: true
    suggested_values:
      - True
      - False
  - name: ObfuscateCommand
    description: The Invoke-Obfuscation command to use.
    required: false
    value: Token\All\1
    depends_on:
      - name: Obfuscate
        values: ['True']
  - name: Bypasses
    description: Bypasses as a space separated list to be prepended to the launcher.
    required: false
    value: ''
  - name: UserAgent
    description: User-agent string to use for the staging request (default, none,
      or other).
    required: false
    value: default
  - name: Proxy
    description: Proxy to use for request (default, none, or other).
    required: false
    value: default
  - name: ProxyCreds
    description: Proxy credentials ([domain\]username:password) to use for request
      (default, none, or other).
    required: false
    value: default
advanced:
  custom_generate: true
