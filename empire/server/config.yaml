suppress_self_cert_warning: true
obfuscation:
  # Maximum seconds for a single obfuscation subprocess.
  # Increase for large modules (e.g. PowerView, Mimikatz) on slow hardware.
  # Set to 0 to disable the timeout entirely.
  timeout: 300
api:
  ip: 0.0.0.0
  port: 1337
  secure: false
server:
  socketio: true
database:
  use: mysql
  mysql:
    url: localhost:3306
    username: empire_user
    password: empire_password
    database_name: empire
    pool_size: 10
    max_overflow: 15
    pool_pre_ping: true
    pool_recycle: 3600
  sqlite:
    location: empire.db
  defaults:
    username: empireadmin
    password: password123
    obfuscation:
      - language: powershell
        enabled: false
        command: "Token\\All\\1"
        module: "invoke-obfuscation"
        preobfuscatable: true
      - language: csharp
        enabled: false
        command: ""
        module: "confuser"
        preobfuscatable: false
      - language: python
        enabled: false
        command: ""
        module: "python-obfuscator"
        preobfuscatable: false
    keyword_obfuscation:
      - Invoke-Empire
      - Invoke-Mimikatz
    bypasses:
      - mattifestation
      - etw
    ip_allow_list: []
    ip_deny_list: []
empire_compiler:
  repo: BC-SECURITY/Empire-Compiler
  ref: v1.0.0
  # Path to the confuser xml project file you want to use
  confuser_proj: empire/server/data/confuser.crproj
starkiller:
  enabled: true
  repo: git@github.com:BC-SECURITY/Starkiller-Sponsors.git
  # Can be a branch, tag, or commit hash
  ref: sponsors-main
submodules:
  auto_update: true
plugin_marketplace:
  registries:
    - name: BC-SECURITY
      git_url: git@github.com:BC-SECURITY/Empire-Plugin-Registry-Sponsors.git
      ref: main
      file: registry.yaml
directories:
  downloads: downloads
logging:
  level: INFO
  simple_console: true
debug:
  last_task:
    enabled: false
    file: debug/last_task.txt
